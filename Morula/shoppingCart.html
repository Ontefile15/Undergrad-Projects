<body>
    <div class="container">
        <h1>Morula Recipes</h1>
        <div class="recipe-card">
            <h2 class="recipe-title">Chocolate Chip Cookies</h2>
            <p class="recipe-price">$5.99</p>
            <button class="add-to-cart" onclick="addToCart('Chocolate Chip Cookies', 5.99)">Add to Cart</button>
        </div>
        <!-- Other recipe cards go here -->
        <div class="cart">
            <h2>Your Cart</h2>
            <div class="cart-item">
                <span class="cart-item-name">Chocolate Chip Cookies</span>
                <span class="cart-item-price">$5.99</span>
            </div>
            <!-- Other cart items go here -->
        </div>
    </div>

    <script>
        // Function to add items to the cart
        function addToCart(itemName, itemPrice) {
            const cartItem = document.createElement('div');
            cartItem.classList.add('cart-item');
            cartItem.innerHTML = `
                <span class="cart-item-name">${itemName}</span>
                <span class="cart-item-price">$${itemPrice.toFixed(2)}</span>
            `;
            document.querySelector('.cart').appendChild(cartItem);
        }
    </script>
